<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melo Mobile FPS - V2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        /* Joystick */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
        }
        /* Botón de Disparo */
        #shoot-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 80px; height: 80px; background: rgba(255,0,0,0.5);
            border: 4px solid #f00; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="shoot-btn">BANG</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ESCENA Y CÁMARA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // Suelo
        scene.add(new THREE.GridHelper(200, 50, 0x444444, 0x222222));

        // Enemigos (Cubos Rojos)
        const enemies = [];
        const enemyGeo = new THREE.BoxGeometry(2, 4, 2);
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        for(let i=0; i<15; i++) {
            const enemy = new THREE.Mesh(enemyGeo, enemyMat);
            enemy.position.set(Math.random()*80-40, 2, Math.random()*80-40);
            scene.add(enemy);
            enemies.push(enemy);
        }

        camera.position.y = 1.7;

        // --- SISTEMA DE BALAS ---
        const bullets = [];
        const bulletGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });

        function shoot() {
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.copy(camera.position);
            
            // Dirección hacia donde mira la cámara
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            bullet.velocity = direction.multiplyScalar(1.2);
            
            scene.add(bullet);
            bullets.push(bullet);
        }

        // --- CONTROLES MÓVILES ---
        let moveX = 0, moveY = 0;
        let lastTouchX, lastTouchY;

        document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            shoot();
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                // Movimiento (Joystick)
                if (t.clientX < window.innerWidth / 2) {
                    const rect = document.getElementById('joystick-container').getBoundingClientRect();
                    const dx = t.clientX - (rect.left + 50);
                    const dy = t.clientY - (rect.top + 50);
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    const angle = Math.atan2(dy, dx);
                    
                    moveX = Math.cos(angle) * (dist/40);
                    moveY = Math.sin(angle) * (dist/40);
                    document.getElementById('joystick-knob').style.transform = `translate(${moveX*40}px, ${moveY*40}px)`;
                } 
                // Cámara (Derecha)
                else {
                    if (lastTouchX) {
                        camera.rotation.y -= (t.clientX - lastTouchX) * 0.005;
                        camera.rotation.x -= (t.clientY - lastTouchY) * 0.005;
                    }
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            moveX = 0; moveY = 0;
            lastTouchX = null; lastTouchY = null;
            document.getElementById('joystick-knob').style.transform = `translate(0px, 0px)`;
        });

        // --- BUCLE PRINCIPAL ---
        function update() {
            requestAnimationFrame(update);

            // Mover cámara
            camera.translateX(moveX * 0.15);
            camera.translateZ(moveY * 0.15);
            camera.position.y = 1.7;

            // Actualizar Balas
            bullets.forEach((b, index) => {
                b.position.add(b.velocity);
                
                // Colisión con enemigos
                enemies.forEach((e, eIndex) => {
                    if (b.position.distanceTo(e.position) < 2) {
                        scene.remove(e);
                        enemies.splice(eIndex, 1);
                        scene.remove(b);
                        bullets.splice(index, 1);
                    }
                });

                // Limpiar balas lejos
                if(b.position.length() > 200) {
                    scene.remove(b);
                    bullets.splice(index, 1);
                }
            });

            renderer.render(scene, camera);
        }
        update();
    </script>
</body>
</html>
