<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Melo FPS - Horizontal Force</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        
        /* Contenedor principal que rotaremos */
        #game-container {
            width: 100vw; height: 100vh;
            position: relative; transition: transform 0.3s ease;
        }

        /* ESTADO FORZADO (Horizontal en celular vertical) */
        .force-landscape {
            width: 100vh !important; height: 100vw !important;
            transform: rotate(90deg);
            transform-origin: top left;
            position: absolute; top: 0; left: 100%;
        }

        /* Botón de Giro */
        #rotate-btn {
            position: absolute; top: 10px; right: 10px;
            padding: 10px; background: rgba(0,255,0,0.3);
            border: 1px solid #0f0; color: #0f0; border-radius: 5px;
            z-index: 100; font-size: 12px; cursor: pointer;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }

        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
        }

        #shoot-btn {
            position: absolute; bottom: 50px; right: 50px;
            width: 80px; height: 80px; background: rgba(255,0,0,0.5);
            border: 3px solid #f00; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="rotate-btn" onclick="toggleRotate()">GIRAR PANTALLA</div>

    <div id="game-container">
        <div id="crosshair"></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="shoot-btn">BANG</div>
        <div id="threejs-canvas"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('game-container');
        let isForced = false;

        // --- MOTOR 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('threejs-canvas').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 40, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // Cubos enemigos
        const enemies = [];
        for(let i=0; i<15; i++){
            const enemy = new THREE.Mesh(new THREE.BoxGeometry(2,4,2), new THREE.MeshPhongMaterial({color: 0xff0000}));
            enemy.position.set(Math.random()*60-30, 2, Math.random()*60-30);
            scene.add(enemy); enemies.push(enemy);
        }

        camera.position.y = 1.7;

        // --- SISTEMA DE GIRO ---
        window.toggleRotate = function() {
            isForced = !isForced;
            if(isForced) {
                container.classList.add('force-landscape');
                renderer.setSize(window.innerHeight, window.innerWidth);
                camera.aspect = window.innerHeight / window.innerWidth;
            } else {
                container.classList.remove('force-landscape');
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
            }
            camera.updateProjectionMatrix();
        }

        // --- CONTROLES ---
        let moveX = 0, moveY = 0;
        let lastX, lastY;

        document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            // Lógica de disparo (simple raycast para borrar enemigos frente a la cámara)
            const raycaster = new THREE.Raycaster();
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            raycaster.set(camera.position, direction);
            
            const intersects = raycaster.intersectObjects(enemies);
            if (intersects.length > 0) {
                const target = intersects[0].object;
                scene.remove(target);
                enemies.splice(enemies.indexOf(target), 1);
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            
            // Lógica ajustada si está rotado
            let clientX = isForced ? touch.clientY : touch.clientX;
            let clientY = isForced ? (window.innerHeight - touch.clientX) : touch.clientY;

            if (clientX < (isForced ? window.innerHeight : window.innerWidth) / 2) {
                // Movimiento
                const rect = document.getElementById('joystick-container').getBoundingClientRect();
                moveX = (clientX - (rect.left + 50)) / 50;
                moveY = (clientY - (rect.top + 50)) / 50;
                document.getElementById('joystick-knob').style.transform = `translate(${moveX*30}px, ${moveY*30}px)`;
            } else {
                // Cámara
                if (lastX) {
                    camera.rotation.y -= (clientX - lastX) * 0.005;
                    camera.rotation.x -= (clientY - lastY) * 0.005;
                }
                lastX = clientX; lastY = clientY;
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            moveX = 0; moveY = 0; lastX = null;
            document.getElementById('joystick-knob').style.transform = `translate(0px, 0px)`;
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.translateX(moveX * 0.1);
            camera.translateZ(moveY * 0.1);
            camera.position.y = 1.7;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
