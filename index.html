<!DOCTYPE html>
<html lang="es">
<head>
  <title>MY_CLIENT | MultiGames Mobile</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <style>
    /* Estilo Cyberpunk Rojo */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #0d0005;
      font-family: 'Segoe UI', system-ui, sans-serif; color: #fff;
    }

    #game_frame { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; display: none; }

    /* Fondo de Red Grid */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: 
        linear-gradient(rgba(255,20,80,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,20,80,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }

    /* Menú Principal */
    #start_screen {
      position: fixed; inset: 0;
      background: radial-gradient(circle at center, #1a000a 0%, #000 100%);
      display: flex; justify-content: center; align-items: center; z-index: 9999;
    }

    .glass-card {
      padding: 30px;
      width: 90%; max-width: 400px;
      background: rgba(20, 0, 8, 0.6);
      border: 2px solid #ff1040;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 16, 64, 0.4);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .brand-title {
      font-size: 3rem; margin: 0; color: #ff1040;
      text-shadow: 0 0 15px #ff1040;
      letter-spacing: 5px; font-weight: 900;
    }

    .play_btn {
      width: 100%; padding: 15px; margin: 10px 0;
      font-size: 1.1rem; font-weight: bold; color: #fff;
      background: #c00; border: none; border-radius: 10px;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .play_btn:hover { background: #ff1040; transform: scale(1.05); }

    .btn-minecraft { background: linear-gradient(90deg, #c00, #ff1040); }
    .btn-blood { background: linear-gradient(90deg, #111, #444); border: 1px solid #ff1040; }
    .btn-roblox { background: linear-gradient(90deg, #0055ff, #00aaff); }

    .loader {
      position: fixed; inset: 0; background: #000;
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10000;
    }
  </style>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/bubbls/loltheygotbannedfromjsdelivr@38f40924ae70b843f3d4d0a5dc3d6ba13ca3a461/classes.min.js"></script>
</head>
<body>

  <div id="loader_screen" class="loader">
    <h2 style="color: #ff1040; letter-spacing: 4px;">CARGANDO MOTOR...</h2>
  </div>

  <div id="start_screen">
    <div class="glass-card">
      <h1 class="brand-title">MI_CLIENTE</h1>
      <p style="color: #ff8080; margin-bottom: 20px;">LANZADOR MULTIJUEGOS</p>
      
      <button class="play_btn btn-minecraft" id="play_mc">MINECRAFT JAVA</button>
      <button class="play_btn btn-blood" id="play_blood">BLOOD STRIKE (CLOUD)</button>
      <button class="play_btn btn-roblox" id="play_roblox">ROBLOX (CLOUD)</button>

      <p style="font-size: 10px; color: #666; margin-top: 15px;">By YourName | 2026</p>
    </div>
  </div>

  <div id="game_frame">
     <iframe id="cloud_iframe" src="" style="width: 100%; height: 100%; border: none; display: none;"></iframe>
  </div>

  <script type="text/javascript">
    const startScreen = document.getElementById('start_screen');
    const loader = document.getElementById('loader_screen');
    const gameFrame = document.getElementById('game_frame');
    const cloudIframe = document.getElementById('cloud_iframe');

    // --- FUNCIÓN PARA MINECRAFT ---
    document.getElementById('play_mc').addEventListener('click', async () => {
      startScreen.style.display = 'none';
      loader.style.display = 'flex';
      
      window.eaglercraftXOpts = {
        container: "game_frame",
        assetsURI: "https://cdn.jsdelivr.net/gh/bubbls/loltheygotbannedfromjsdelivr@38f40924ae70b843f3d4d0a5dc3d6ba13ca3a461/assets.epk",
        localesURI: "lang/",
        mainMenu: { splashes: ["MY CLIENT READY"], brand: "MY CLIENT" },
        servers: [{ addr: "wss://mc.arch.lol/", name: "ArchMC" }]
      };

      setTimeout(() => {
        loader.style.display = 'none';
        gameFrame.style.display = 'block';
        if (typeof main === "function") main();
      }, 2000);
    });

    // --- FUNCIÓN PARA BLOOD STRIKE ---
    document.getElementById('play_blood').addEventListener('click', () => {
      startScreen.style.display = 'none';
      gameFrame.style.display = 'block';
      cloudIframe.style.display = 'block';
      cloudIframe.src = "https://web.cloudmoonapp.com/es/game/com.netease.newspike/";
    });

    // --- FUNCIÓN PARA ROBLOX ---
    document.getElementById('play_roblox').addEventListener('click', () => {
      startScreen.style.display = 'none';
      gameFrame.style.display = 'block';
      cloudIframe.style.display = 'block';
      cloudIframe.src = "https://now.gg/games/roblox-mini-games.html";
    });
  </script>
</body>
</html>
